<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面未找到 - 清珞未来</title>
  <meta name="description" content="页面未找到 — 清珞未来，AI数据服务全链路解决方案提供商。">
  <link rel="icon" href="assets/images/favicon.png" type="image/png">
  <link rel="stylesheet" href="assets/css/style.css?v=4">
  <script src="assets/js/i18n.js"></script>
  <style>
    .page-404 {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px;
      position: relative;
      overflow: hidden
    }
    .page-404-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(117, 73, 255, 0.25) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 100%, rgba(117, 73, 255, 0.08) 0%, transparent 60%);
      z-index: 0
    }
    .page-404-grid {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(117, 73, 255, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(117, 73, 255, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0
    }
    .page-404-content {
      position: relative;
      z-index: 1;
      max-width: 600px
    }
    .page-404-code {
      font-size: 120px;
      font-weight: 800;
      background: linear-gradient(135deg, #7000FF, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: 4px
    }
    .page-404 h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #F4F0FF
    }
    .page-404 p {
      color: rgba(255, 255, 255, 0.55);
      font-size: 15px;
      margin-bottom: 32px;
      line-height: 1.8
    }
    .page-404-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap
    }
  </style>
</head>

<body class="page" data-page="404">

  <div id="nav-placeholder"></div>

  <div class="page-404">
    <div class="page-404-bg"></div>
    <div class="page-404-grid"></div>
    <div class="page-404-content ql-reveal">
      <div class="page-404-code">404</div>
      <h1>页面未找到</h1>
      <p>您访问的页面不存在或已被移除。<br>请检查链接是否正确，或返回首页继续浏览。</p>
      <div class="page-404-actions">
        <a href="index.html" class="btn btn-primary">返回首页</a>
        <a href="contact.html" class="btn btn-outline">联系我们</a>
      </div>
    </div>
  </div>

  <div class="back-to-top" id="backToTop">
    <button onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="回到顶部">↑</button>
  </div>

  <div id="footer-placeholder"></div>

  <script src="assets/js/include.js"></script>
  <script>
    /* Back to top */
    (function () {
      var btn = document.getElementById('backToTop');
      if (!btn) return;
      var toggle = function () { btn.classList.toggle('show', window.scrollY > 400) };
      window.addEventListener('scroll', toggle);
      toggle();
    })();
  </script>
</body>

</html>
